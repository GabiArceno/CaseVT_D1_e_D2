<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Clientes, Produtos e Vendas</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="app-header">
    <h1>Cadastro de Clientes, Produtos e Vendas</h1>
  </header>

  <nav class="tabs">
    <button type="button" class="tab-btn active" data-view="cliente">Cliente</button>
    <button type="button" class="tab-btn" data-view="produto">Produto</button>
    <button type="button" class="tab-btn" data-view="venda">Venda</button>
    <button type="button" class="tab-btn" data-view="tabela">Clientes Cadastrados</button>
  </nav>

  <main class="container">

    <section class="card view active" id="view-cliente" data-view="cliente">
      <h2>Cliente</h2>
      <form id="form-cliente" autocomplete="off">
        <input type="hidden" id="cliente-id">

        <div class="form-row">
          <label>Nome
            <input type="text" id="cliente-nome" required>
          </label>
          <label>Sobrenome
            <input type="text" id="cliente-sobrenome" required>
          </label>
        </div>

        <div class="form-row">
          <label>Data de Nascimento
            <input type="date" id="cliente-data-nascimento" required>
          </label>
          <label>Telefone
            <input type="text" id="cliente-telefone" placeholder="(41) 99999-9999" required>
          </label>
        </div>

        <div class="form-row">
          <label>Email
            <input type="email" id="cliente-email" required>
          </label>
          <label>Foto de Perfil
            <input type="file" id="cliente-foto" accept="image/*">
          </label>
        </div>

        <fieldset class="endereco-fieldset">
          <legend>Endereço</legend>
          <div class="form-row">
            <label>CEP
              <input type="text" id="cliente-cep" placeholder="00000000" maxlength="9" required>
            </label>
            <button type="button" id="btn-buscar-cep">Buscar CEP</button>
          </div>
          <div class="form-row">
            <label>Rua
              <input type="text" id="cliente-rua" readonly>
            </label>
            <label>Bairro
              <input type="text" id="cliente-bairro" readonly>
            </label>
          </div>
          <div class="form-row">
            <label>Cidade
              <input type="text" id="cliente-cidade" readonly>
            </label>
            <label>Estado
              <input type="text" id="cliente-estado" readonly>
            </label>
          </div>
        </fieldset>

        <p class="form-erro" id="cliente-erro"></p>

        <div class="form-actions">
          <button type="submit" id="btn-salvar-cliente">Criar Cadastro</button>
          <button type="button" id="btn-excluir-cliente" class="btn-perigo" disabled>Excluir</button>
          <button type="button" id="btn-cancelar-cliente" disabled>Cancelar Edição</button>
        </div>
      </form>
    </section>

    <section class="card view" id="view-produto" data-view="produto">
      <h2>Produto</h2>
      <form id="form-produto" autocomplete="off">
        <input type="hidden" id="produto-id">
        <div class="form-row">
          <label>Código
            <input type="text" id="produto-codigo" required>
          </label>
          <label>Nome
            <input type="text" id="produto-nome" required>
          </label>
        </div>
        <div class="form-row">
          <label>Descrição
            <input type="text" id="produto-descricao">
          </label>
          <label>Valor (R$)
            <input type="number" id="produto-valor" min="0.01" step="0.01" required>
          </label>
        </div>
        <div class="form-row">
          <label>Data do Cadastro
            <input type="text" id="produto-data-cadastro" readonly>
          </label>
        </div>
        <p class="form-erro" id="produto-erro"></p>
        <div class="form-actions">
          <button type="submit">Cadastrar Produto</button>
        </div>
      </form>
    </section>

    <section class="card view" id="view-venda" data-view="venda">
      <h2>Venda</h2>
      <form id="form-venda" autocomplete="off">
        <div class="form-row">
          <label>Cliente
            <select id="venda-cliente" required></select>
          </label>
          <label>Produto
            <select id="venda-produto" required></select>
          </label>
        </div>
        <div class="form-row">
          <label>Quantidade
            <input type="number" id="venda-quantidade" min="1" step="1" value="1" required>
          </label>
          <label>Total da Compra
            <input type="text" id="venda-total" readonly placeholder="R$ 0,00">
          </label>
        </div>
        <p class="form-erro" id="venda-erro"></p>
        <p class="form-sucesso" id="venda-sucesso"></p>
        <div class="form-actions">
          <button type="submit">Gerar Venda</button>
        </div>
      </form>
    </section>

    <section class="card card-tabela view" id="view-tabela" data-view="tabela">
      <h2>Clientes Cadastrados</h2>

      <div class="tabela-toolbar">
        <label>Ano
          <select id="filtro-ano"><option value="">Todos</option></select>
        </label>
        <label>Mês
          <select id="filtro-mes">
            <option value="">Todos</option>
            <option value="01">Janeiro</option><option value="02">Fevereiro</option>
            <option value="03">Março</option><option value="04">Abril</option>
            <option value="05">Maio</option><option value="06">Junho</option>
            <option value="07">Julho</option><option value="08">Agosto</option>
            <option value="09">Setembro</option><option value="10">Outubro</option>
            <option value="11">Novembro</option><option value="12">Dezembro</option>
          </select>
        </label>
      </div>

      <table id="tabela-clientes">
        <thead>
          <tr>
            <th></th>
            <th data-sort="nome">Nome</th>
            <th data-sort="email">Email</th>
            <th data-sort="cidade">Cidade</th>
            <th data-sort="criado_em">Cadastrado em</th>
            <th data-sort="total_compras">Compras</th>
            <th data-sort="total_gasto">Total Gasto</th>
          </tr>
        </thead>
        <tbody id="tabela-clientes-body"></tbody>
      </table>

      <div class="paginacao" id="paginacao"></div>
    </section>

  </main>

  <script src="js/tabs.js"></script>
  <script src="js/frontForm.js"></script>
  <script src="js/table.js"></script>
</body>
</html>
